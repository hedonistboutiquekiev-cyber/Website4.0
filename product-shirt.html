<!DOCTYPE html>
<html lang="tr" class="product-text-black">
<head>
  <!-- Универсальный favicon-блок -->
  <link rel="icon" type="image/png" href="/assets/icons/AlbaLogo.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/assets/icons/AlbaLogo.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/assets/icons/AlbaLogo.png" sizes="180x180">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="msapplication-TileColor" content="#020617">
  <meta name="msapplication-TileImage" content="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unisex Starbase City T-Shirt  Alba Space</title>
  
  <!--    (   ) -->
  <link rel="stylesheet" href="/assets/css/site.css">
  <link rel="stylesheet" href="/assets/css/fix-layout.css">
  <link rel="stylesheet" href="/assets/css/product-overrides.css">
  
  <!-- Tailwind       -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!--    -->
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/cart.js" defer></script>
  <!-- product-gallery.js  ,         -->

  <style>
    /*    */
    :root {
      --header-bg: #020617;
      --accent: #00c2ff;
      --accent-hover: #0099cc;
      --page-bg: #020617;
      --text-main: #f3f4f6;
    }

    body {
      background-color: var(--page-bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    /*  */
    .space-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
      z-index: -1;
      pointer-events: none;
    }

    /*  */
    .main-image-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    
    .main-image-container:hover {
      transform: scale(1.02);
    }

    .thumb-btn {
      border: 2px solid transparent;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .thumb-btn.active {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /*  */
    .btn-glow {
      background: var(--accent);
      box-shadow: 0 0 20px rgba(0, 194, 255, 0.3);
      transition: all 0.3s ease;
    }

    .btn-glow:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 30px rgba(0, 194, 255, 0.5);
      transform: translateY(-1px);
    }

    .qty-input::-webkit-inner-spin-button {
      display: none;
    }

    /*   */
    .glass-card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /*  */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /*   */
    .payment-icons img {
      height: 24px;
      width: auto;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    
    .payment-icons img:hover {
      opacity: 1;
    }
        /* ===== Local overrides to beat global site.css ===== */
    /* Ensure main product image is reduced to 70% and not limited by global rules */
    #mainImage,
    .main-image-container img {
      width: 70% !important;
      max-width: 720px !important;
      display: block !important;
      margin: 0 auto !important;
      height: auto !important;
      object-fit: cover !important;
      border-radius: 24px !important;
    }

    /* Thumbnails: force square shape with rounded corners */
    .thumb-btn {
      width: 80px !important;
      height: 80px !important;
      min-width: 80px !important;
      min-height: 80px !important;
      border-radius: 12px !important;
      overflow: hidden !important;
      padding: 0 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .thumb-btn img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      border-radius: inherit !important;
    }
  </style>
  <link rel="stylesheet" href="/assets/css/product-text-black.css">
</head>
<body>
  <!--    -->
  <div data-include="/header-tr-black"></div>

  

  <main class="max-w-7xl mx-auto px-4 py-8 md:py-16">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start product-grid">
      
      <!--  -->
      <div class="reveal">
        <div class="main-image-container mb-6">
          <img id="mainImage" src="/assets/images/shirt.png" alt="Alba Space Tisort" class="w-full h-auto object-cover aspect-[4/5]">
        </div>
        <div class="flex gap-4 overflow-x-auto pb-2" id="galleryThumbs">
          <button class="thumb-btn active rounded-xl flex-shrink-0 w-20 h-20 md:w-24 md:h-24 overflow-hidden" onclick="changeImage(this, '/assets/images/shirt.png')">
            <img src="/assets/images/shirt.png" class="w-full h-full object-cover">
          </button>
        
          <button class="thumb-btn rounded-xl flex-shrink-0 w-20 h-20 md:w-24 md:h-24 overflow-hidden" onclick="changeImage(this, '/assets/images/shirt1.png')">
            <img src="/assets/images/shirt1.png" class="w-full h-full object-cover">
          </button>
          <button class="thumb-btn rounded-xl flex-shrink-0 w-20 h-20 md:w-24 md:h-24 overflow-hidden" onclick="changeImage(this, '/assets/images/shirt2.png')">
            <img src="/assets/images/shirt2.png" class="w-full h-full object-cover">
          </button>
          <button class="thumb-btn rounded-xl flex-shrink-0 w-20 h-20 md:w-24 md:h-24 overflow-hidden" onclick="changeImage(this, '/assets/images/shirt3.png')">
            <img src="/assets/images/shirt3.png" class="w-full h-full object-cover">
          </button></div>
      </div>

      <!--   -->
      <div class="reveal" style="transition-delay: 0.1s;">
        <nav class="text-xs uppercase tracking-widest text-gray-500 mb-4">Ürünler / Giyim / Tişört</nav>
        <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight uppercase"> Tişört</h1>
        
        <div class="glass-card p-6 rounded-3xl mb-8">
          <h3 class="text-sm font-semibold uppercase text-gray-400 mb-4">Ozellikler</h3>
          <ul class="space-y-3 text-gray-300">
            <li class="flex items-center gap-3">
              <span class="w-1.5 h-1.5 rounded-full" style="background:var(--accent)"></span>
              Ultra soft cotton blend for everyday comfort
            </li>
            <li class="flex items-center gap-3">
              <span class="w-1.5 h-1.5 rounded-full" style="background:var(--accent)"></span>
              Crew neck and short sleeves
            </li>
            <li class="flex items-center gap-3">
              <span class="w-1.5 h-1.5 rounded-full" style="background:var(--accent)"></span>
              Pre-shrunk for a consistent fit
            </li>
            <li class="flex items-center gap-3">
              <span class="w-1.5 h-1.5 rounded-full" style="background:var(--accent)"></span>
              Screen printed  graphic
            </li>
          </ul>
        </div>

        
        <!-- Payment Icons -->
        <div class="flex flex-wrap items-center gap-6 payment-icons mb-6">
          <img src="/assets/icons/mastercard.png" alt="mastercard">
          <img src="/assets/icons/visa.png" alt="visa">
        </div><div class="flex flex-col sm:flex-row gap-4 mb-8">
          <!--   -->
          <div class="flex items-center bg-gray-900 border border-gray-800 rounded-2xl p-1 h-14" data-qty>
            <button class="w-12 h-full flex items-center justify-center text-xl hover:text-white transition" onclick="updateQty(-1)">&minus;</button>
            <input type="number" id="qtyInput" value="1" min="1" class="qty-input w-12 bg-transparent text-center font-semibold outline-none text-white" data-qty-input>
            <button class="w-12 h-full flex items-center justify-center text-xl hover:text-white transition" onclick="updateQty(1)">&plus;</button>
          </div>
          
          <!--     -->
          <button id="addToCartBtn" 
            class="btn-glow flex-1 h-14 rounded-2xl text-black font-bold uppercase tracking-wider transition-all"
            data-product-id="tshirt"
            data-product-name="Alba Space T-Shirt"
            data-product-price="630"
            data-product-image="/assets/images/shirt.png"
            data-add-label="SEPETE EKLE"
            data-added-label="EKLENDI!">
            SEPETE EKLE
          </button>
        </div>

        <!--   -->
      </div>
    </div>

    <!--   -->
    <section class="mt-24 reveal">
      <div class="flex justify-between items-end mb-10">
        <div>
          <h2 class="text-3xl font-bold uppercase tracking-tight">Bunları da beğenebilirsiniz</h2>
          <div class="h-1 w-20 bg-blue-500 mt-2 rounded-full"></div>
        </div>
      </div>

      <div id="related-products-container" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>
  </main>

  <!--    -->
  <div data-include="/footer-tr-black"></div>

  <script>
    //  
    function changeImage(el, src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.thumb-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }

    //  
    function updateQty(delta) {
      const input = document.getElementById('qtyInput');
      let val = parseInt(input.value) + delta;
      if (val < 1) val = 1;
      input.value = val;
    }

    //   
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    //   (   cart.js)
    const cartBtn = document.getElementById('addToCartBtn');
    cartBtn.addEventListener('click', () => {
      const input = document.getElementById('qtyInput');
      const qty = parseInt(input.value || '1', 10);
      
      // ,        cart.js
      if (typeof cartManager !== 'undefined') {
          cartManager.addItem({
            id: cartBtn.dataset.productId,
            name: cartBtn.dataset.productName,
            price: Number(cartBtn.dataset.productPrice),
            image: cartBtn.dataset.productImage,
            url: window.location.pathname,
            qty
          });
      } else {
        console.warn('cartManager  .   /assets/js/cart.js');
      }

      //   
      const originalText = cartBtn.innerHTML;
      cartBtn.innerHTML = cartBtn.dataset.addedLabel || 'EKLENDI!';
      cartBtn.style.background = '#22c55e';
      cartBtn.disabled = true;
      
      setTimeout(() => {
        cartBtn.innerHTML = originalText;
        cartBtn.style.background = '';
        cartBtn.disabled = false;
      }, 1400);
    });
  </script>
<script src="/assets/js/related-products.js" defer></script>
</body>
</html>
