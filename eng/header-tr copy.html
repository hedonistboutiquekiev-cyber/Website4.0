<script>

    const hideOn = [
      '/index.html',
      '/shop.html',
      '/hakkimizda.html',
      '/hizmetler.html',
      '/kupsat.html',
      '/basindabiz.html',
      '/galeri.html',
      '/iletisim.html'
    ];
    if (hideOn.includes(location.pathname)) {
      const btn = document.querySelector('.ai-widget-toggle');
      if (btn) btn.style.display = 'none';
    }
  });
</script>

<script>
  function toggleAlienMenu(e) {
    e.preventDefault();
    const menu = document.getElementById('alienMenu');
    const trigger = document.querySelector('.alien-ghost');
    if (menu.style.display === 'none') {
      menu.style.display = 'block';
      if (trigger) trigger.setAttribute('aria-expanded', 'true');
    } else {
      menu.style.display = 'none';
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }
  }
  document.addEventListener('click', function(e) {
    const container = document.querySelector('.alien-dropdown-container');
    const menu = document.getElementById('alienMenu');
    if (container && !container.contains(e.target) && menu && menu.style.display === 'block') {
      menu.style.display = 'none';
      const trigger = document.querySelector('.alien-ghost');
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const menu = document.getElementById('alienMenu');
      const trigger = document.querySelector('.alien-ghost');
      if (menu) menu.style.display = 'none';
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }
  });
</script>
