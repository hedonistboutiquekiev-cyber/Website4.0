<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR: Виртуальная примерка (Albaspace Edition)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        /* Контейнер для всего приложения */
        #app-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Видео и 3D-холст накладываются друг на друга */
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Видео на заднем плане, 3D поверх него */
        video { z-index: 1; }
        #three_canvas { z-index: 2; pointer-events: none; }

        /* Интерфейс управления */
        .ui-overlay { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .status-badge { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid rgba(255,255,255,0.2); }
        .controls { display: flex; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 15px; backdrop-filter: blur(10px); }
        
        button { 
            padding: 12px 18px; border: none; background: rgba(255,255,255,0.2); color: white; 
            border-radius: 10px; cursor: pointer; transition: all 0.2s ease; font-weight: bold;
        }
        button:hover { background: rgba(255,255,255,0.4); transform: translateY(-2px); }
        button.active { background: #3498db; box-shadow: 0 0 15px rgba(52, 152, 219, 0.5); }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="three_canvas"></canvas>

        <div class="ui-overlay">
            <div class="status-badge" id="status">Инициализация системы...</div>
            <div class="controls">
                <button onclick="switchModel('glasses1')" id="btn-glasses1">Очки 1</button>
                <button onclick="switchModel('glasses2')" id="btn-glasses2">Очки 2</button>
                <button onclick="switchModel('cap1')" id="btn-cap1">Кепка</button>
                <button onclick="switchModel('none')" style="background: rgba(231, 76, 60, 0.4);">Сброс</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        // --- 1. НАСТРОЙКИ МОДЕЛЕЙ ---
        // scale: размер модели (зависит от ваших .glb)
        // yOffset: смещение по вертикали (для кепки, если она сидит слишком низко)
        const MODELS_CONFIG = {
            glasses1: { type: 'glasses', url: 'glasses1.glb', scale: 0.15, yOffset: 0 },
            glasses2: { type: 'glasses', url: 'glasses2.glb', scale: 0.16, yOffset: 0 },
            cap1:     { type: 'cap',     url: 'cap1.glb',     scale: 0.35, yOffset: 0.18 }
        };

        const video = document.getElementById("webcam");
        const status = document.getElementById("status");
        
        let faceLandmarker;
        let scene, camera, renderer, gltfLoader;
        let currentModel = null;
        let activeKey = 'none';
        let lastVideoTime = -1;

        // --- 2. ИНИЦИАЛИЗАЦИЯ THREE.JS ---
        function initThreeJS() {
            scene = new THREE.Scene();

            // Используем OrthographicCamera для точного наложения на 2D видео
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('three_canvas'),
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Освещение (настроено для реалистичности 3D)
            const ambient = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 2.0);
            directional.position.set(0, 1, 2);
            scene.add(directional);

            gltfLoader = new GLTFLoader();
        }

        // --- 3. ЗАГРУЗКА И СМЕНА МОДЕЛЕЙ ---
        window.switchModel = async (key) => {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            // Сброс активных кнопок
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            if(key === 'none') {
                activeKey = 'none';
                status.innerText = "Режим просмотра";
                return;
            }

            const config = MODELS_CONFIG[key];
            const btn = document.getElementById(`btn-${key}`);
            if(btn) btn.classList.add('active');

            status.innerText = "Загрузка 3D...";
            
            gltfLoader.load(config.url, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                activeKey = key;
                status.innerText = "Примерка активна";
            }, undefined, (err) => {
                console.error(err);
                status.innerText = "Ошибка загрузки .glb";
            });
        };

        // --- 4. НЕЙРОСЕТЬ MEDIAPIPE ---
        async function initAR() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });
            
            initThreeJS();
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    status.innerText = "Система готова";
                    predictWebcam();
                });
            } catch (err) {
                status.innerText = "Доступ к камере отклонен";
            }
        }

        // --- 5. ГЛАВНЫЙ ЦИКЛ ОБНОВЛЕНИЯ ---
        function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());

                if (results.faceLandmarks && results.faceLandmarks[0] && currentModel) {
                    updateTransform(results.faceLandmarks[0]);
                } else if (currentModel) {
                    currentModel.visible = false;
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        // --- 6. ЛОГИКА ПРИВЯЗКИ (ВАШИ ПИВОТЫ) ---
        function updateTransform(landmarks) {
            currentModel.visible = true;
            const config = MODELS_CONFIG[activeKey];
            const aspect = window.innerWidth / window.innerHeight;

            // Конвертация координат MediaPipe -> Three.js
            const getPos = (idx) => ({
                x: (landmarks[idx].x * 2 - 1) * aspect,
                y: -(landmarks[idx].y * 2 - 1),
                z: -landmarks[idx].z * 10
            });

            // Точки привязки
            const leftTemple = getPos(234);
            const rightTemple = getPos(454);
            const bridge = getPos(168); // Между глазами
            const forehead = getPos(10); // Верх лба

            // Расчет ширины лица для масштабирования
            const faceWidth = Math.sqrt(Math.pow(rightTemple.x - leftTemple.x, 2) + Math.pow(rightTemple.y - leftTemple.y, 2));
            const angle = Math.atan2(rightTemple.y - leftTemple.y, rightTemple.x - leftTemple.x);

            if (config.type === 'glasses') {
                // ПИВОТ ОЧКОВ: Точно на переносице
                currentModel.position.set(bridge.x, bridge.y, bridge.z);
            } else {
                // ПИВОТ КЕПКИ: Центр модели. Ставим на лоб и поднимаем на yOffset
                currentModel.position.set(forehead.x, forehead.y + config.yOffset, forehead.z);
            }

            currentModel.rotation.z = angle;
            
            // Динамическое масштабирование
            const s = faceWidth * config.scale * 10;
            currentModel.scale.set(s, s, s);
            
            // Небольшой наклон (Yaw) в зависимости от поворота головы
            const yaw = (landmarks[454].z - landmarks[234].z) * 2;
            currentModel.rotation.y = yaw;
        }

        // Обработка ресайза
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -aspect; camera.right = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initAR();
    </script>
</body>
</html>
