  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Debug Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        video { z-index: 1; background: #222; }
        #three_canvas { z-index: 2; pointer-events: none; }
        .ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .status-badge { background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 5px; font-size: 12px; border: 1px solid #444; max-width: 300px; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="three_canvas"></canvas>

        <div class="ui-overlay">
            <div class="status-badge" id="status">Запуск камеры...</div>
            <div id="debug-log" style="font-size: 10px; color: #aaa;"></div>
        </div>

        <div class="controls">
            <button onclick="switchModel('glasses1')">Очки 1</button>
            <button onclick="switchModel('glasses2')">Очки 2</button>
            <button onclick="switchModel('cap1')">Кепка</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const MODELS_CONFIG = {
            glasses1: { type: 'glasses', url: 'glasses1.glb', scale: 0.15, yOffset: 0 },
            glasses2: { type: 'glasses', url: 'glasses2.glb', scale: 0.16, yOffset: 0 },
            cap1:     { type: 'cap',     url: 'cap1.glb',     scale: 0.35, yOffset: 0.2 }
        };

        const status = document.getElementById("status");
        const debugLog = document.getElementById("debug-log");
        const video = document.getElementById("webcam");

        function log(msg) {
            debugLog.innerHTML += "> " + msg + "<br>";
            console.log(msg);
        }

        let faceLandmarker, scene, camera, renderer, gltfLoader, currentModel;
        let activeKey = 'none';

        // 1. Сначала запускаем камеру!
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                log("Камера запущена");
                initEverything();
            } catch (err) {
                status.innerText = "ОШИБКА КАМЕРЫ";
                log(err.message);
            }
        }

        // 2. Затем грузим всё остальное
        async function initEverything() {
            try {
                log("Загрузка ресурсов нейросети...");
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });
                log("Нейросеть готова");

                // Three.js
                scene = new THREE.Scene();
                const aspect = window.innerWidth / window.innerHeight;
                camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
                camera.position.z = 5;

                renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three_canvas'), alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                
                scene.add(new THREE.AmbientLight(0xffffff, 2));
                gltfLoader = new GLTFLoader();

                status.innerText = "Система активна. Выберите модель.";
                renderLoop();
            } catch (err) {
                status.innerText = "СБОЙ ИНИЦИАЛИЗАЦИИ";
                log(err.stack);
            }
        }

        window.switchModel = (key) => {
            if (currentModel) scene.remove(currentModel);
            if (key === 'none') return;

            status.innerText = "Загрузка модели...";
            gltfLoader.load(MODELS_CONFIG[key].url, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                activeKey = key;
                status.innerText = "Модель: " + key;
            }, undefined, (e) => {
                log("Ошибка файла " + MODELS_CONFIG[key].url);
                status.innerText = "Файл не найден!";
            });
        };

        function renderLoop() {
            if (video.currentTime !== -1 && faceLandmarker) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks[0] && currentModel) {
                    updatePose(results.faceLandmarks[0]);
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }

        function updatePose(lm) {
            currentModel.visible = true;
            const aspect = window.innerWidth / window.innerHeight;
            const config = MODELS_CONFIG[activeKey];

            const p = (i) => ({
                x: (lm[i].x * 2 - 1) * aspect,
                y: -(lm[i].y * 2 - 1),
                z: -lm[i].z
            });

            const bridge = p(168);
            const forehead = p(10);
            const left = p(234);
            const right = p(454);

            if (config.type === 'glasses') {
                currentModel.position.set(bridge.x, bridge.y, bridge.z);
            } else {
                currentModel.position.set(forehead.x, forehead.y + config.yOffset, forehead.z);
            }

            const width = Math.hypot(right.x - left.x, right.y - left.y);
            const s = width * config.scale * 10;
            currentModel.scale.set(s, s, s);
            currentModel.rotation.z = Math.atan2(right.y - left.y, right.x - left.x);
        }

        setupCamera();
    </script>
</body>
</html>
